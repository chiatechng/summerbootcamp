<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080c1a">
  <meta name="description" content="ChiaTech Summer Bootcamp — Nigeria's smartest summer lesson portal. First Term 2026/2027 lessons for JSS1–SS3, aligned to NERDC 2025. Covers WAEC, NECO, JAMB, BECE. Works offline.">
  <meta name="keywords" content="ChiaTech, summer bootcamp, NERDC 2025, JSS1, SS3, WAEC, JAMB, BECE, Nigeria, lesson notes, scheme of work">
  <meta name="author" content="ChiaTech Solutions & Resources Ltd">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="ChiaTech Summer Bootcamp 2026">
  <meta property="og:description" content="First Term 2026/2027 lessons for JSS1–SS3. NERDC 2025 aligned. Works offline.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://summer.chiatechsolutions.com">
  <meta property="og:image" content="assets/og-image.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <title>ChiaTech Summer Bootcamp 2026 | JSS1–SS3 First Term Lessons</title>
</head>
<body>
  <a href="#main" class="skip-link btn btn-primary">Skip to content</a>

  <!-- ══════════ HEADER ══════════ -->
  <header class="site-header" role="banner">
    <div class="container">
      <a href="#" class="brand-lockup" data-goto="home" id="brandLockup">
        <img src="assets/logo.png" alt="ChiaTech Logo" class="brand-logo"
             onerror="this.style.display='none'">
        <div class="brand-copy">
          <h1>ChiaTech Summer Bootcamp</h1>
          <span class="tagline">First Term 2026/2027 — NERDC 2025</span>
        </div>
      </a>
      <div class="header-actions">
        <span id="sessionPill">Not logged in</span>
        <button class="btn btn-primary btn-sm hidden" id="installAppButton">
          📲 Install App
        </button>
        <button class="btn btn-ghost btn-sm hidden" id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>

  <!-- ══════════ TOP NAV ══════════ -->
  <nav class="top-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-btn is-active" data-view="home"      id="navHome">🏠 Home</button>
    <button class="nav-btn"           data-view="register"  id="navRegister">📝 Register</button>
    <button class="nav-btn"           data-view="dashboard" id="navDashboard">📚 Dashboard</button>
    <button class="nav-btn"           data-view="admin"     id="navAdmin">🔐 Admin</button>
  </nav>

  <!-- ══════════ MAIN ══════════ -->
  <main id="main" role="main">

    <!-- HOME VIEW -->
    <section class="view is-active" id="homeView" aria-label="Home">
      <!-- dynamically rendered by app.js -->
      <div class="page-loader">
        <div class="spinner"></div>
        <p>Loading portal…</p>
      </div>
    </section>

    <!-- REGISTER VIEW -->
    <section class="view" id="registerView" aria-label="Registration">
      <div class="page-loader">
        <div class="spinner"></div>
        <p>Loading registration form…</p>
      </div>
    </section>

    <!-- DASHBOARD VIEW -->
    <section class="view" id="dashboardView" aria-label="Student Dashboard">
      <div class="page-loader">
        <div class="spinner"></div>
        <p>Loading dashboard…</p>
      </div>
    </section>

    <!-- ADMIN VIEW -->
    <section class="view" id="adminView" aria-label="Admin Panel">
      <div class="page-loader">
        <div class="spinner"></div>
        <p>Loading admin panel…</p>
      </div>
    </section>

  </main>

  <!-- ══════════ GLOBAL MODAL ══════════ -->
  <div class="modal-overlay" id="globalModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box" id="modalBox">
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ══════════ TOAST ══════════ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ══════════ SCRIPTS ══════════ -->
  <!-- Order matters: config data → offline db → api client → curriculum → pwa → app -->
  <script src="js/curriculum-data.js"></script>
  <script src="js/offline-db.js"></script>
  <script src="js/sheet-api.js"></script>
  <script src="js/pwa.js"></script>
  <script src="js/app.js"></script>

  <noscript>
    <style>.page-loader{display:none}</style>
    <div style="font-family:sans-serif;text-align:center;padding:4rem;color:#e8edf5;background:#080c1a;min-height:100vh">
      <h2>JavaScript Required</h2>
      <p>ChiaTech Summer Bootcamp requires JavaScript. Please enable it in your browser to use this portal.</p>
      <p style="margin-top:1rem">Contact: chiatech01@gmail.com | +234 703 768 9917</p>
    </div>
  </noscript>
</body>
</html>
